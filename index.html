            --bg-3: #eef2ff;
            --bg-4: #ecfeff;
            --text: #0f172a;
            --muted: #475569;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.78);
            --glass-strong: rgba(255, 255, 255, 0.9);
            --border: rgba(148, 163, 184, 0.22);
            --purple: #1d4ed8;
            --pink: #0ea5e9;
            --blue: #1d4ed8;
            --cyan: #06b6d4;
            --deep: #0b1220;
            --shadow: 0 18px 50px rgba(76, 29, 149, 0.14);
            --radius: 24px;
            --max-width: 1180px;
            --transition: 0.28s ease;

        * {

        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: Inter, Arial, Helvetica, sans-serif;
            color: var(--text);

            line-height: 1.6;
        }

        img {
            max-width: 100%;
            display: block;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button {
            font: inherit;
        }

        .container {
            width: min(var(--max-width), calc(100% - 2rem));
            margin: 0 auto;
        }

        .section {
            padding: 88px 0;
        }

        .section-title {

            line-height: 1.12;
            margin: 0 0 14px;
            color: var(--text);
            letter-spacing: -0.03em;
        }

        .section-subtitle {
            max-width: 760px;
            margin: 0 0 34px;
            color: var(--muted);
            font-size: 1rem;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: linear-gradient(135deg, rgba(29, 78, 216, 0.10), rgba(14, 165, 233, 0.10));
            color: #1d4ed8;
            border: 1px solid rgba(29, 78, 216, 0.16);
            border-radius: 999px;
            font-weight: 800;
            font-size: 0.92rem;
            box-shadow: 0 8px 20px rgba(29, 78, 216, 0.06);
        }

        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 13px 22px;
            border-radius: 16px;
            font-weight: 700;
            border: 1px solid transparent;
            cursor: pointer;
            transition: transform var(--transition), box-shadow var(--transition), background var(--transition), color var(--transition);
        }

        .btn:hover,
        .btn:focus-visible {
            transform: translateY(-3px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #1d4ed8, #0ea5e9);
            color: #fff;
            box-shadow: 0 16px 32px rgba(29, 78, 216, 0.18);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.75);
            color: var(--text);
            border-color: rgba(124, 58, 237, 0.14);
            backdrop-filter: blur(10px);
        }

        .btn-dark {
            background: linear-gradient(135deg, #111827, #312e81);
            color: #fff;
            box-shadow: 0 16px 32px rgba(30, 27, 75, 0.18);
        }

        .site-header {
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(16px);
            background: rgba(255, 255, 255, 0.55);
            border-bottom: 1px solid rgba(255, 255, 255, 0.34);
        }

        .nav-wrap {
            min-height: 76px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            position: relative;
        }

        .brand {
            font-size: 1.08rem;
            font-weight: 900;
            color: var(--deep);
            letter-spacing: 0.2px;
        }

        .brand span {
            background: linear-gradient(135deg, var(--purple), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }

        .nav-toggle {
            display: none;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(124, 58, 237, 0.14);
            border-radius: 12px;
            padding: 10px 12px;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 22px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--muted);
            font-weight: 700;
            transition: color var(--transition);
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--purple);
        }

        .hero {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #0b1220 0%, #111827 100%);
            color: #e2e8f0;
            padding: 96px 0 74px;
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: auto -10% -40px auto;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.08), transparent 70%);
            filter: blur(12px);
            pointer-events: none;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1.12fr 0.88fr;
            gap: 32px;
            align-items: center;
        }

        .hero h1 {
            font-size: clamp(2.7rem, 4.5vw, 5rem);
            line-height: 1.03;
            margin: 18px 0 14px;
            letter-spacing: -0.04em;
        }

        .hero-role {
            font-size: 1.14rem;
            font-weight: 800;
            color: #cbd5e1;
            margin-bottom: 12px;
        }

        .hero p {
            color: #cbd5e1;
            max-width: 640px;
            margin: 0 0 28px;
            font-size: 1.04rem;
        }

        .hero-card,

            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
        }

        .hero-card {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.18);
            box-shadow: 0 22px 56px rgba(0, 0, 0, 0.22);

        .hero-card h3,
        .hero-card p {
            color: #f8fafc;
        }

        .hero-stats {

            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-top: 22px;
        }

        .stat-box {
            padding: 18px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.14);
        }

        .stat-box strong {
            display: block;
            font-size: 1.02rem;
            color: #fff;
            margin-bottom: 6px;
        }

        .stat-box span {
            color: #cbd5e1;
            font-size: 0.95rem;
        }

        .grid-2,
        .grid-3,
        .grid-4 {
            display: grid;
            gap: 22px;
        }

        .grid-2 {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .grid-3 {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .grid-4 {
            grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .card h4 {
            margin: 0 0 10px;
            line-height: 1.2;
            color: var(--deep);
        }

        .card li,

            color: var(--muted);

            gap: 12px;

            padding-left: 18px;

            height: 8px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--purple), var(--pink));
            position: absolute;
            left: 0;
            top: 10px;

            font-size: 0.94rem;

            height: 20px;

        .reveal.show {
            opacity: 1;
            transform: translateY(0);
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(17, 24, 39, 0.72);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 120;
        }

        .modal.open {
            display: flex;
        }

        .modal-dialog {
            width: min(760px, 100%);
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(2, 6, 23, 0.28);
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 42px;
            height: 42px;
            border: none;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.95);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .modal-preview {
            min-height: 280px;
            background: linear-gradient(135deg, #f5d0fe 0%, #fde68a 46%, #bfdbfe 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
            text-align: center;
            font-weight: 900;
            color: #4c1d95;
            font-size: 1.25rem;
        }

        .modal-body {
            padding: 24px;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 980px) {

            .hero-grid,
            .grid-2,
            .grid-3,
            .grid-4 {
                grid-template-columns: 1fr 1fr;
            }

            .hero-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 760px) {
            .nav-toggle {
                display: inline-flex;
            }

            .nav-links {
                display: none;
                position: absolute;
                left: 1rem;
                right: 1rem;
                top: calc(100% + 10px);
                background: rgba(255, 255, 255, 0.92);
                border: 1px solid rgba(124, 58, 237, 0.12);
                border-radius: 18px;
                padding: 16px;
                box-shadow: var(--shadow);
                flex-direction: column;
                align-items: flex-start;
                backdrop-filter: blur(12px);
            }

            .nav-links.open {
                display: flex;
            }

            .grid-2,
            .grid-3,
            .grid-4,
            .hero-stats {
                grid-template-columns: 1fr;
            }

            .section {
                padding: 72px 0;
            }

            .hero {
                padding-top: 84px;
            }

            .hero h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>

    renderApp();

    const navToggle = document.getElementById('navToggle');
    navToggle.addEventListener('click', () => {
      const open = navLinks.classList.toggle('open');
      navToggle.setAttribute('aria-expanded', String(open));
    });

    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        navLinks.classList.remove('open');
        navToggle.setAttribute('aria-expanded', 'false');
      });
    });

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('show');
      });
    }, { threshold: 0.15 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    const sections = [...document.querySelectorAll('main section[id]')];
    const navAnchorMap = [...document.querySelectorAll('.nav-links a')];

    const sectionObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const id = entry.target.getAttribute('id');
        navAnchorMap.forEach(link => {
          link.classList.toggle('active', link.getAttribute('href') === `
            #$ {
                id
            }
            `);
        });
      });
    }, { threshold: 0.55 });

    sections.forEach(section => sectionObserver.observe(section));

    const modal = document.getElementById('sampleModal');

    const modalText = document.getElementById('modalText');
    const modalClose = document.getElementById('modalClose');

    function openModal(sample) {
      modalPreview.textContent = sample.preview;
      modalTitle.textContent = sample.title;
      modalText.textContent = sample.description;
      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    document.querySelectorAll('.sample-view').forEach(button => {

    modalClose.addEventListener('click', closeModal);

    });
    document.addEventListener('keydown', event => {
